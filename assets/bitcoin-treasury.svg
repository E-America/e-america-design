<svg preserveAspectRatio="none" width="100%" height="100%" overflow="visible" style="display: block;" viewBox="0 0 140 140" fill="none" xmlns="http://www.w3.org/2000/svg">
<circle cx="70" cy="70" r="70" fill="white"/>
<!-- Bitcoin B with treasury/vault elements -->
<g id="bitcoin-treasury-icon">
  <!-- Vault/Treasury box -->
  <rect x="35" y="55" width="70" height="50" fill="#B6C4CF" rx="4"/>
  <rect x="38" y="58" width="64" height="44" fill="#DDF4FE" rx="2"/>

  <!-- Vault door circle -->
  <circle cx="70" cy="80" r="18" fill="#9FACBA"/>
  <circle cx="70" cy="80" r="15" fill="#C8EFFE"/>

  <!-- Bitcoin B symbol -->
  <g transform="translate(70, 80)">
    <!-- Vertical line -->
    <line x1="0" y1="-20" x2="0" y2="-15" stroke="#FF9500" stroke-width="2"/>
    <line x1="0" y1="15" x2="0" y2="20" stroke="#FF9500" stroke-width="2"/>

    <!-- B shape -->
    <path d="M-5 -15 L5 -15 C8 -15, 10 -13, 10 -10 C10 -8, 8 -6, 6 -6 L-5 -6 Z" fill="#FF9500"/>
    <path d="M-5 -4 L7 -4 C10 -4, 12 -2, 12 1 C12 4, 10 6, 7 6 L-5 6 Z" fill="#FF9500"/>
    <rect x="-7" y="-15" width="2" height="21" fill="#FF9500"/>
  </g>

  <!-- Coins stacked on top -->
  <ellipse cx="50" cy="52" rx="8" ry="3" fill="#FFD700"/>
  <ellipse cx="50" cy="50" rx="8" ry="3" fill="#FFA500"/>
  <ellipse cx="50" cy="48" rx="8" ry="3" fill="#FFD700"/>

  <ellipse cx="90" cy="52" rx="8" ry="3" fill="#FFD700"/>
  <ellipse cx="90" cy="50" rx="8" ry="3" fill="#FFA500"/>
  <ellipse cx="90" cy="48" rx="8" ry="3" fill="#FFD700"/>

  <!-- Lock indicator -->
  <circle cx="70" cy="80" r="4" fill="#60B7FF"/>
  <rect x="69" y="80" width="2" height="6" fill="#60B7FF"/>
</g>
</svg>
