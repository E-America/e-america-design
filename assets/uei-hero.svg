<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60B7FF;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#BBEC6C;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#A2E62E;stop-opacity:0.3" />
    </linearGradient>
    <linearGradient id="coin-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg-gradient)"/>

  <!-- Digital network lines connecting people -->
  <g opacity="0.3">
    <line x1="150" y1="200" x2="400" y2="300" stroke="#0b1e46" stroke-width="2" stroke-dasharray="5,5"/>
    <line x1="400" y1="300" x2="650" y2="200" stroke="#0b1e46" stroke-width="2" stroke-dasharray="5,5"/>
    <line x1="150" y1="400" x2="400" y2="300" stroke="#0b1e46" stroke-width="2" stroke-dasharray="5,5"/>
    <line x1="650" y1="400" x2="400" y2="300" stroke="#0b1e46" stroke-width="2" stroke-dasharray="5,5"/>
  </g>

  <!-- People icons (simplified) -->
  <g id="person1" transform="translate(150, 180)">
    <circle cx="0" cy="0" r="25" fill="#0b1e46" opacity="0.8"/>
    <circle cx="0" cy="40" r="35" fill="#0b1e46" opacity="0.8"/>
  </g>

  <g id="person2" transform="translate(650, 180)">
    <circle cx="0" cy="0" r="25" fill="#0b1e46" opacity="0.8"/>
    <circle cx="0" cy="40" r="35" fill="#0b1e46" opacity="0.8"/>
  </g>

  <g id="person3" transform="translate(150, 380)">
    <circle cx="0" cy="0" r="25" fill="#0b1e46" opacity="0.8"/>
    <circle cx="0" cy="40" r="35" fill="#0b1e46" opacity="0.8"/>
  </g>

  <g id="person4" transform="translate(650, 380)">
    <circle cx="0" cy="0" r="25" fill="#0b1e46" opacity="0.8"/>
    <circle cx="0" cy="40" r="35" fill="#0b1e46" opacity="0.8"/>
  </g>

  <!-- Center: Coins/earnings symbol -->
  <g id="center-earnings" transform="translate(400, 300)">
    <!-- Stack of coins -->
    <ellipse cx="0" cy="0" rx="50" ry="15" fill="url(#coin-gradient)" opacity="0.9"/>
    <ellipse cx="0" cy="-10" rx="50" ry="15" fill="url(#coin-gradient)" opacity="0.95"/>
    <ellipse cx="0" cy="-20" rx="50" ry="15" fill="url(#coin-gradient)"/>

    <!-- Dollar sign -->
    <line x1="0" y1="-40" x2="0" y2="-30" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <path d="M-10 -30 C-10 -35, -5 -38, 0 -38 C5 -38, 10 -35, 10 -30 C10 -25, 5 -22, 0 -20 C-5 -18, -10 -15, -10 -10 C-10 -5, -5 -2, 0 -2 C5 -2, 10 -5, 10 -10"
          stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round"/>
    <line x1="0" y1="-2" x2="0" y2="8" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Arrow flows (earned income) -->
  <g opacity="0.6">
    <path d="M 180 220 Q 290 250 380 280" stroke="#A2E62E" stroke-width="3" fill="none"/>
    <polygon points="380,280 375,275 385,282 375,287" fill="#A2E62E"/>

    <path d="M 620 220 Q 510 250 420 280" stroke="#A2E62E" stroke-width="3" fill="none"/>
    <polygon points="420,280 425,275 415,282 425,287" fill="#A2E62E"/>
  </g>

  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="8" fill="#FFD700" opacity="0.7"/>
  <circle cx="700" cy="100" r="8" fill="#FFD700" opacity="0.7"/>
  <circle cx="100" cy="500" r="8" fill="#FFD700" opacity="0.7"/>
  <circle cx="700" cy="500" r="8" fill="#FFD700" opacity="0.7"/>

  <!-- Text overlay (optional) -->
  <text x="400" y="550" font-family="Ubuntu Mono, monospace" font-size="24" fill="#0b1e46" text-anchor="middle" font-weight="bold" opacity="0.6">
    EARN · CONTRIBUTE · GROW
  </text>
</svg>
